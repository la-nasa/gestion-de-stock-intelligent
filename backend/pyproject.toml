[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  | migrations
  | .venv
  | venv
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
known_first_party = ["apps", "api", "core", "services", "tasks", "config"]
known_third_party = ["django", "rest_framework", "celery", "channels"]

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "Q",   # flake8-quotes
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking-imports
    "PT",  # flake8-pytest-style
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function calls in argument defaults
    "C901", # Too complex
]
exclude = [
    ".git",
    ".venv",
    "venv",
    "migrations",
    "__pycache__",
    "node_modules",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["PT009", "PT027"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = ["migrations/", ".venv/", "venv/"]

[tool.bandit]
exclude_dirs = [".venv", "venv", "tests", "migrations"]
skips = ["B101", "B104", "B311"]  # assert, binding, random

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py", "*_test.py"]
testpaths = ["tests"]
addopts = "-v --strict-markers --cov=. --cov-report=html --cov-report=term"
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "api: marks tests as API tests",
]