services:
  - type: web
    name: iuc-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "iuc-api.onrender.com,iuc-inventory.vercel.app,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: iuc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: iuc-redis
          type: redis
          property: connectionString

  - type: redis
    name: iuc-redis
    plan: free
    region: frankfurt

databases:
  - name: iuc-db
    plan: free
    region: frankfurt
    databaseName: iuc_inventory
    user: iuc_user