
# Configuration DNS pour éviter les problèmes de résolution
x-dns-config: &dns-config
  dns:
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1

services:
  postgres:
    image: postgres:16-alpine
    container_name: iuc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-iuc_inventory}
      POSTGRES_USER: ${DB_USER:-iuc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iuc_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - iuc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iuc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: iuc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - iuc_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: iuc_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - iuc_network

  minio:
    image: minio/minio:latest
    container_name: iuc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - iuc_network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: iuc_backend
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://${DB_USER:-iuc_user}:${DB_PASSWORD:-iuc_password}@postgres:5432/${DB_NAME:-iuc_inventory}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - REDIS_CELERY_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ../backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iuc_network
    command: python manage.py runserver 0.0.0.0:8000

  celery:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: iuc_celery
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://${DB_USER:-iuc_user}:${DB_PASSWORD:-iuc_password}@postgres:5432/${DB_NAME:-iuc_inventory}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - REDIS_CELERY_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
    volumes:
      - ../backend:/app
    depends_on:
      - redis
    networks:
      - iuc_network
    command: celery -A config worker -l info -c 2

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: iuc_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - iuc_network
    command: npx next dev --port 3000

  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/ml-service/Dockerfile
    container_name: iuc_ml_service
    restart: unless-stopped
    environment:
      - DEBUG=true
      - DATABASE_URL=postgres://${DB_USER:-iuc_user}:${DB_PASSWORD:-iuc_password}@postgres:5432/${DB_NAME:-iuc_inventory}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - ../ml-service:/app
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"
    depends_on:
      - redis
    networks:
      - iuc_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  static_volume:
  media_volume:

networks:
  iuc_network:
    driver: bridge