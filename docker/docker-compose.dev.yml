version: '3.8'

services:
  backend:
    environment:
      - DEBUG=true
      - DJANGO_SETTINGS_MODULE=config.settings.development
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"

  frontend:
    environment:
      - NODE_ENV=development
    command: npm run dev
    volumes:
      - ../frontend:/app
      - /app/node_modules

  ml-service:
    environment:
      - DEBUG=true
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    volumes:
      - ../ml-service:/app
